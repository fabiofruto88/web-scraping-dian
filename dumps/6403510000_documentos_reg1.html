      <script type="text/javascript">

      function mostrarPaises(nombre){
        document.getElementById("vistaDocumentosSoporte:formDocumentosSoporte:ideDocumento").value=nombre;
        document.getElementById("vistaDocumentosSoporte:formDocumentosSoporte:lnkConsultarPaises").onclick();
        return false;
      }

      function desabilitar(valor){
        if(valor=='T'){
          document.getElementById("vistaDocumentosSoporte:formDocumentosSoporte:nombreLugar").disabled=true;
        }else{
          document.getElementById("vistaDocumentosSoporte:formDocumentosSoporte:nombreLugar").disabled=false;
        }
      }

      function validarNombreLugar(){
         if(!document.getElementById("vistaDocumentosSoporte:formDocumentosSoporte:nombreLugar").disabled){
           if(document.getElementById("vistaDocumentosSoporte:formDocumentosSoporte:nombreLugar").value.length >= 2){
             return true;
           }else{
             var unaFabricaMensajes = new DFabricaMensajes();
             var unMensaje = unaFabricaMensajes.getMensaje(0,COD_TIPO_ERROR,"Consulta por pais","Ingrese mínimo 2 letras","Error");
             miGestorMensajes.agregarMensaje(unMensaje);
             miGestorMensajes.mostrarMensaje();
             return false;
           }
         }else{
           return true;
         }
       }
